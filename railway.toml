# ================================================================
# Railway.app — déploiement single-server (alternative à Render)
#
# Railway a un crédit gratuit de $5/mois (hobby plan).
# Pour la base de données, ajouter un service PostgreSQL Railway
# OU utiliser Neon (https://neon.tech) en externe.
# ================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
