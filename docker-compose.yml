services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: partyhub
      POSTGRES_PASSWORD: partyhub
      POSTGRES_DB: partyhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partyhub"]
      interval: 3s
      timeout: 5s
      retries: 25
      start_period: 20s

volumes:
  pgdata:
