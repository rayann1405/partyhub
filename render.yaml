# ================================================================
# Render.com — déploiement single-server (gratuit)
#
# Base de données : utiliser Neon (https://neon.tech) — gratuit,
# pas de limite de durée. Créer un projet → copier la DATABASE_URL.
#
# Déploiement :
#   1. Connecter ce repo sur https://dashboard.render.com
#   2. "New Web Service" → repo GitHub → Render détecte ce fichier
#   3. Remplir les variables marquées sync: false dans le dashboard
# ================================================================

services:
  - type: web
    name: partyhub
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      # URL Neon (ou autre PostgreSQL externe)
      # Format : postgres://user:pass@ep-xxx.neon.tech/partyhub?sslmode=require
      - key: DATABASE_URL
        sync: false

      # URL publique de ce service (disponible après le premier déploiement)
      # Exemple : https://partyhub.onrender.com
      - key: CLIENT_URL
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true

      # Optionnel — upload d'images
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
